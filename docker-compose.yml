services:
  mongodb:
    image: mongo:latest
    container_name: adwall-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: adwall-server
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/advertise-wall
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - mongodb

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_WS_URL=/ws
    container_name: adwall-admin-web
    # 改为内部访问，不映射到宿主机端口
    expose:
      - "80"
    depends_on:
      - server

  advertiser-web:
    build:
      context: .
      dockerfile: apps/advertiser-web/Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_WS_URL=/ws
        - VITE_ADMIN_URL=/admin
    container_name: adwall-advertiser-web
    expose:
      - "80"
    depends_on:
      - server

  gateway:
    image: nginx:stable-alpine
    container_name: adwall-gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - admin-web
      - advertiser-web

volumes:
  mongodb_data:
