events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # Docker 内网 DNS，强制动态解析：防止容器重建后 IP 变化导致 502
        resolver 127.0.0.11 valid=10s ipv6=off;

        # 1. 登录页重定向 (指向 advertiser-web 的登录)
        location = /login {
            return 301 /advertiser/login;
        }

        # 2. 管理端
        location /admin/ {
            set $admin_upstream http://admin-web:80;
            rewrite ^/admin/(.*)$ /$1 break;
            proxy_pass $admin_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. 广告主端
        location /advertiser/ {
            set $advertiser_upstream http://advertiser-web:80;
            rewrite ^/advertiser/(.*)$ /$1 break;
            proxy_pass $advertiser_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 4. 后端 API
        location /api/ {
            set $server_upstream http://server:3000;
            proxy_pass $server_upstream/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 5. WebSocket
        location /ws {
            set $ws_upstream http://server:3000;
            proxy_pass $ws_upstream/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # 6. 静态文件 (uploads)
        location /uploads/ {
            set $uploads_upstream http://server:3000;
            proxy_pass $uploads_upstream/uploads/;
        }

        # 默认跳转
        location / {
            return 301 /advertiser/;
        }
    }
}
