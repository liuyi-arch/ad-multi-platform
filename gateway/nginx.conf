events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        client_max_body_size 100M;

        # 1. 登录与注册路由 (指向 advertiser-web)
        location /login/ {
            proxy_pass http://advertiser-web:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /register/ {
            proxy_pass http://advertiser-web:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 2. 静态资源转发与强缓存 (Assets & Fonts Caching)
        location ~ ^/(assets|fonts|favicon.ico) {
            proxy_pass http://advertiser-web:80;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # 3. 管理端 (仍保留独立子目录逻辑)
        location /admin/ {
            # 针对 admin 内部的静态资源也尝试强缓存 (可选，但为了覆盖 fonts)
            if ($request_uri ~* \.(?:ttf|woff2?|js|css|png|jpg|jpeg|gif|ico|svg)$ ) {
                expires 1y;
                add_header Cache-Control "public, max-age=31536000, immutable";
            }
            proxy_pass http://admin-web:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 4. 广告主端业务路径 (透传完整路径)
        location /advertiser/ {
            proxy_pass http://advertiser-web:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 4. 后端 API
        location /api/ {
            proxy_pass http://server:3000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 5. WebSocket
        location /ws {
            proxy_pass http://server:3000/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # 6. 静态文件 (uploads)
        location /uploads/ {
            proxy_pass http://server:3000/uploads/;
        }

        # 默认跳转
        location / {
            return 301 /advertiser/;
        }
    }
}
