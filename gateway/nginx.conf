events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        client_max_body_size 100M;

        # 1. 管理端 (使用 ^~ 明确前缀隔离，优先级高于正则，且不剥离 /admin/ 以外的路径)
        location ^~ /admin/ {
            proxy_pass http://admin-web:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. 后端 API
        location /api/ {
            proxy_pass http://server:3000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3. WebSocket
        location /ws {
            proxy_pass http://server:3000/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # 4. 静态文件 (uploads)
        location /uploads/ {
            proxy_pass http://server:3000/uploads/;
        }

        # 5. 兜底路由至广告主端 (处理 /, /assets, /login, /register, /advertiser 等所有流量)
        # 这种方式完美兼容 advertiser-web 的 base: '/' 配置
        location / {
            proxy_pass http://advertiser-web:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
